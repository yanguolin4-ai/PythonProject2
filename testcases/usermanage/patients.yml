-
  name: 获取患者列表-默认分页
  description: 不传分页参数，使用默认值，返回200
  request:
    method: get
    url: http://localhost:3000/api/patients
    headers:
      Content-Type: application/json
    data:
      page: 1
      pageSize: 10
  expected:
    status_code: 200
    json:
      code: 200

-
  name: 获取患者列表-第2页
  description: 请求第2页数据，返回200
  request:
    method: get
    url: http://localhost:3000/api/patients
    headers:
      Content-Type: application/json
    data:
      page: 2
      pageSize: 10
  expected:
    status_code: 200

-
  name: 按姓名搜索患者
  description: 搜索包含"王"字的患者，返回200
  request:
    method: get
    url: http://localhost:3000/api/patients/search
    headers:
      Content-Type: application/json
    data:
      name: 王
  expected:
    status_code: 200

-
  name: 按科室搜索患者
  description: 搜索内科的患者，返回200
  request:
    method: get
    url: http://localhost:3000/api/patients/search
    headers:
      Content-Type: application/json
    data:
      department: 内科
  expected:
    status_code: 200

-
  name: 获取存在的患者详情
  description: 查询ID为1的患者详情，返回200
  request:
    method: get
    url: http://localhost:3000/api/patients/1
    headers:
      Content-Type: application/json
    data: {}
  expected:
    status_code: 200

-
  name: 获取不存在的患者详情
  description: 查询不存在的患者ID，返回404
  request:
    method: get
    url: http://localhost:3000/api/patients/999
    headers:
      Content-Type: application/json
    data: {}
  expected:
    status_code: 404
