-
  name: 登录成功获取token，返回200
  description: 输入用账号和密码获取token
  request:
    method: post
    url: http://localhost:3000/api/auth/login    #获取token登录用这个
    headers:
      Content-Type: application/json
    data:
         username : admin
         password : '123456'
  expected:
    status_code: 200

